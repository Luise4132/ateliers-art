# netlify.toml — Configuration de déploiement Netlify (site statique).
# Redirections + en-têtes de cache. Aucun build : tout est servi tel quel.

# ===== Espace d'administration =====
# Le nouveau CMS (Decap) est dans le dossier /admin/.
# On force /admin ET l'ancienne /admin.html à pointer vers le CMS, pour éviter
# que l'ancienne page (champ mot de passe) ne s'affiche encore.
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/admin/"
  status = 301
  force = true

# ===== En-têtes de cache =====
# Le HTML ne doit jamais être mis en cache (contenu mis à jour fréquemment)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Le CMS et sa configuration : pas de cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Les images sont versionnées par leur nom : cache long (1 an)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS : cache d'une semaine
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# JS : cache d'une semaine
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Les données JSON ne doivent pas être mises en cache (mises à jour via le CMS)
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
